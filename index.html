<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N_LAND | Servidor Minecraft</title>
    <style>
        :root {
            --bg: #030305;
            --accent: #53fc18; /* Color verde tipo Minecraft */
            --text: #ffffff;
            --overlay: rgba(0, 0, 0, 0.85);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            background: url('https://preview.redd.it/nala-estaba-sufriendo-jsjjsjaj-v0-2ivvf8feb0ke1.jpeg?auto=webp&s=4dd8ae471d1c5cb0f13178d8b31fe2428d7116d1') no-repeat center center fixed;
            background-size: cover;
        }

        /* Menú Hamburguesa */
        .menu-btn {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            cursor: pointer; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px;
        }
        .menu-btn div { width: 25px; height: 3px; background: white; margin: 5px 0; }

        /* Navegación */
        .nav-overlay {
            height: 100%; width: 0; position: fixed; z-index: 200; top: 0; right: 0;
            background-color: var(--overlay); overflow-x: hidden; transition: 0.5s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .nav-overlay a {
            padding: 15px; text-decoration: none; font-size: 25px; color: #f1f1f1;
            display: block; transition: 0.3s; font-weight: bold;
        }
        .nav-overlay a:hover { color: var(--accent); }

        /* Contenido Principal */
        .main-container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; background: rgba(0,0,0,0.5);
        }
        h1 { font-size: 4rem; margin: 0; color: var(--accent); text-shadow: 0 0 20px rgba(83, 252, 24, 0.5); }
        
        .box {
            background: rgba(15, 15, 20, 0.9); padding: 40px; border-radius: 15px;
            text-align: center; border: 1px solid #333; max-width: 500px;
        }
    </style>
</head>
<body>

<div class="menu-btn" onclick="openNav()">
    <div></div><div></div><div></div>
</div>

<div id="myNav" class="nav-overlay">
    <a href="javascript:void(0)" onclick="closeNav()" style="position:absolute; top:20px; right:20px;">✕</a>
    <a href="#" onclick="showSection('ip')">IP DEL SERVIDOR</a>
    <a href="#" onclick="showSection('mods')">DESCARGAR MODS</a>
    <a href="#" onclick="showSection('desc')">DESCRIPCIÓN</a>
</div>

<div class="main-container">
    <div class="box" id="content">
        <h1>N_LAND</h1>
        <p>Bienvenido al hub oficial del servidor.</p>
        <p id="dynamic-text">Selecciona una opción en el menú superior.</p>
    </div>
</div>

<script>
    function openNav() { document.getElementById("myNav").style.width = "100%"; }
    function closeNav() { document.getElementById("myNav").style.width = "0%"; }

    function showSection(type) {
        const content = document.getElementById('dynamic-text');
        const box = document.getElementById('content');
        
        if(type === 'ip') {
            content.innerHTML = "<b>IP:</b> N_LAND.aternos.me:20942<br><small>(Click para copiar)</small>";
            content.style.cursor = "pointer";
            content.onclick = () => { navigator.clipboard.writeText("N_LAND.aternos.me:20942"); alert("IP copiada"); };
        } else if(type === 'mods') {
            content.innerHTML = "<a href='#' style='color:var(--accent)'>Click aquí para bajar el .rar de mods</a>";
        } else {
            content.innerHTML = "Un servidor de Minecraft para la comunidad. ¡Diviértete!";
        }
        closeNav();
    }
</script>

</body>
</html>
